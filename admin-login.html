<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>بوابة الإشراف الآمنة | بطاقة الشام الرقمية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans Arabic', sans-serif;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  
  <!-- Subtle Background Decorative Elements -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl"></div>

  <div class="w-full max-w-md bg-slate-800/80 backdrop-blur-2xl border border-slate-700/60 rounded-[32px] p-8 shadow-2xl space-y-6 relative z-10">
    
    <!-- Branding Header -->
    <div class="text-center space-y-2">
      <div class="w-16 h-16 bg-gradient-to-tr from-emerald-600 to-teal-500 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-emerald-900/30">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1 class="text-2xl font-black text-white tracking-tight pt-2">بوابة الإشراف والتحكم</h1>
      <p class="text-slate-400 text-xs font-medium">بطاقة الشام الرقمية - نظام الإدارة المركزي المعزول</p>
    </div>

    <!-- Live Toast/Alert Notification Block -->
    <div id="toast" class="hidden p-4 rounded-2xl text-xs font-bold text-center transition-all duration-300"></div>

    <!-- Login Form -->
    <form id="loginForm" class="space-y-5 text-right">
      <div>
        <label for="phone" class="block text-[11px] font-black text-slate-400 mb-1.5 mr-1">رقم هاتف المسؤول (المشرف) *</label>
        <div class="relative">
          <input 
            type="text" 
            id="phone" 
            required
            placeholder="مثال: 963944444444+" 
            class="w-full bg-slate-950/60 border border-slate-700 rounded-2xl p-4 text-sm font-semibold tracking-wide text-white placeholder-slate-500 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-left"
            dir="ltr"
          />
        </div>
      </div>

      <div>
        <label for="password" class="block text-[11px] font-black text-slate-400 mb-1.5 mr-1">كلمة مرور النظام السرية *</label>
        <input 
          type="password" 
          id="password" 
          required
          placeholder="••••••" 
          class="w-full bg-slate-950/60 border border-slate-700 rounded-2xl p-4 text-sm font-semibold tracking-wide text-white placeholder-slate-500 outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all text-left"
          dir="ltr"
        />
      </div>

      <div class="flex items-center justify-between text-xs font-bold text-slate-400 px-1 pt-1">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" checked class="rounded border-slate-700 text-emerald-600 focus:ring-emerald-500 bg-slate-900 w-4 h-4" />
          <span>تذكر هويتي الرقمية</span>
        </label>
        <span class="text-emerald-500 hover:underline cursor-pointer">هل نسيت كلمة المرور؟</span>
      </div>

      <button 
        type="submit" 
        id="submitBtn"
        class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-[0.98] disabled:bg-slate-700 disabled:text-slate-500 disabled:scale-100 text-white font-black py-4 rounded-2xl text-sm transition-all duration-200 shadow-lg shadow-emerald-950/40 flex items-center justify-center gap-2 mt-2"
      >
        <span id="btnText">تحقق والدخول للوحة التحكم</span>
        <svg id="loadingSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      </button>
    </form>

    <!-- Footer Policy Note -->
    <div class="text-center">
      <p class="text-[10px] text-slate-500 font-bold leading-relaxed px-4">
        هذا النظام آمن ومحمي بجدار ناري مشفر. أي محاولة وصول غير مصرح بها من قبل مستخدمين عاديين تعرض صاحبها للمساءلة القانونية وحظر الهوية بشكل نهائي.
      </p>
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const phoneInput = document.getElementById('phone');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const loadingSpinner = document.getElementById('loadingSpinner');
    const toast = document.getElementById('toast');

    function showToast(message, type) {
      toast.textContent = message;
      toast.className = `p-4 rounded-2xl text-xs font-bold text-center transition-all duration-300 block ${
        type === 'success' ? 'bg-emerald-500/20 text-emerald-300 border border-emerald-500/30' : 'bg-red-500/20 text-red-300 border border-red-500/30'
      }`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const phone = phoneInput.value.trim();
      const password = passwordInput.value.trim();

      if (!phone.endsWith('4444')) {
        showToast('خطأ: واجهة الإشراف مخصصة للمشرفين فقط (رقم هاتف ينتهي بـ 4444)', 'error');
        return;
      }

      // Show loader
      submitBtn.disabled = true;
      btnText.classList.add('hidden');
      loadingSpinner.classList.remove('hidden');
      toast.classList.add('hidden');

      try {
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ phone, password })
        });

        const data = await response.json();

        if (response.ok) {
          showToast('تم التحقق بنجاح! جاري تحويلك الآمن...', 'success');
          // Save session locally to be safe
          localStorage.setItem('cham_admin_session', JSON.stringify({
            token: data.token,
            user: data.user,
            role: 'admin'
          }));
          setTimeout(() => {
            window.location.href = '/admin';
          }, 1500);
        } else {
          showToast(data.message || 'فشل تسجيل الدخول، يرجى التحقق من البيانات', 'error');
          submitBtn.disabled = false;
          btnText.classList.remove('hidden');
          loadingSpinner.classList.add('hidden');
        }
      } catch (err) {
        showToast('حدث خطأ بالاتصال بالخادم الآمن.', 'error');
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        loadingSpinner.classList.add('hidden');
      }
    });

    // Check for inactivity timeout flag on page load
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('timeout') === 'true') {
        showToast('تم تسجيل الخروج تلقائياً بسبب عدم النشاط لمدة 5 دقائق لحماية لوحة التحكم والبيانات.', 'error');
      }
    });
  </script>
</body>
</html>
